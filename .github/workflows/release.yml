name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: dad-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: dad-darwin-x86_64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: dad-linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web frontend
        run: bun run build

      - name: Compile binary
        run: bun build packages/cli/src/cli.ts --compile --target=${{ matrix.target }} --outfile dad

      - name: Package tarball
        run: |
          mkdir -p dist/share/diffdad
          cp dad dist/
          cp -r packages/web/dist dist/share/diffdad/web
          cd dist
          tar czf ../${{ matrix.artifact }}.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.tar.gz'

  update-formula:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: nicknisi/homebrew-diffdad
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VER="${VERSION#v}"
          SHA_ARM64=$(shasum -a 256 dad-darwin-arm64.tar.gz | cut -d' ' -f1)
          SHA_X86_64=$(shasum -a 256 dad-darwin-x86_64.tar.gz | cut -d' ' -f1)
          SHA_LINUX=$(shasum -a 256 dad-linux-x86_64.tar.gz | cut -d' ' -f1)
          cd tap
          sed -i "s/version \".*\"/version \"${VER}\"/" Formula/dad.rb
          python3 -c "
          import re, sys
          f = 'Formula/dad.rb'
          txt = open(f).read()
          shas = {'arm64': '${SHA_ARM64}', 'x86_64': '${SHA_X86_64}', 'linux': '${SHA_LINUX}'}
          for arch, sha in shas.items():
              txt = re.sub(r'(dad-.*' + arch + r'.*\n\s*sha256 \")([a-fA-F0-9]+|PLACEHOLDER_\w+)(\")', lambda m: m.group(1) + sha + m.group(3), txt)
          open(f, 'w').write(txt)
          "

      - name: Commit formula
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dad.rb
          git diff --cached --quiet || git commit -m "formula: update to ${{ github.ref_name }}"
          git push
