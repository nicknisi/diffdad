.ab.sq1200 .speech { position: absolute; background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 16px 20px; font-family: Fraunces, Georgia, serif; font-size: 22px; max-width: 280px; line-height: 1.3; box-shadow: rgba(21, 35, 63, 0.2) 0px 30px 60px -20px; }
.ab.sq1200 .speech .lbl { font-family: "JetBrains Mono", monospace; font-size: 13px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.ab.sq1200 .speech.s1 { top: 10px; right: -30px; transform: rotate(2deg); }
.ab.sq1200 .speech.s2 { bottom: 30px; left: -40px; transform: rotate(-3deg); }
.ab.sq1200 .footer-row { display: flex; justify-content: space-between; align-items: center; font-family: "JetBrains Mono", monospace; font-size: 22px; }
.ab.sq1200 .footer-row .url .acc { color: var(--accent); }
.ab.sq1200 .footer-row .tagline { color: var(--muted); font-style: italic; font-family: Fraunces, Georgia, serif; font-size: 24px; }
.ab.banner1500 { width: 1500px; height: 500px; padding: 60px 80px; display: grid; grid-template-columns: 1fr auto; gap: 40px; align-items: center; }
.ab.banner1500 .eyebrow { font-family: "JetBrains Mono", monospace; font-size: 16px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 14px; }
.ab.banner1500 h1 { font-family: Fraunces, Georgia, serif; font-weight: 600; font-size: 80px; line-height: 1; letter-spacing: -0.02em; margin: 0px 0px 16px; }
