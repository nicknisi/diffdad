.ab.og1200 .url { font-family: "JetBrains Mono", monospace; font-size: 18px; color: var(--ink); display: inline-flex; align-items: center; gap: 12px; }
.ab.og1200 .url .acc { color: var(--accent); }
.ab.og1200 .dad-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
.ab.og1200 .dad-disc { width: 380px; height: 380px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; box-shadow: rgba(255, 122, 69, 0.4) 0px 30px 60px -20px; }
.ab.og1200 .speech { position: absolute; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 12px 16px; font-family: Fraunces, Georgia, serif; font-size: 16px; max-width: 220px; line-height: 1.3; box-shadow: rgba(21, 35, 63, 0.2) 0px 20px 40px -20px; }
.ab.og1200 .speech .lbl { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.ab.og1200 .speech.s1 { top: -14px; right: -50px; transform: rotate(2deg); }
.ab.og1200 .speech.s2 { bottom: 4px; left: -64px; transform: rotate(-3deg); }
.ab.tw1200 { width: 1200px; height: 600px; padding: 60px 80px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; align-items: center; }
.ab.tw1200 h1 { font-family: Fraunces, Georgia, serif; font-weight: 600; font-size: 70px; line-height: 1.02; letter-spacing: -0.02em; margin: 0px 0px 22px; text-wrap: balance; }
.ab.tw1200 h1 em { color: var(--accent); font-style: italic; }
.ab.tw1200 .eyebrow { font-family: "JetBrains Mono", monospace; font-size: 16px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 18px; }
.ab.tw1200 .sub { font-size: 20px; color: var(--ink-2); line-height: 1.4; max-width: 540px; margin: 0px 0px 24px; }
.ab.tw1200 .url { font-family: "JetBrains Mono", monospace; font-size: 17px; color: var(--ink); }
.ab.tw1200 .url .acc { color: var(--accent); }
.ab.tw1200 .dad-wrap { display: flex; align-items: center; justify-content: center; position: relative; }
.ab.tw1200 .dad-disc { width: 360px; height: 360px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; box-shadow: rgba(255, 122, 69, 0.4) 0px 30px 60px -20px; }
.ab.sq1200 { width: 1200px; height: 1200px; padding: 100px; display: grid; grid-template-rows: auto auto 1fr auto; gap: 32px; }
.ab.sq1200 .eyebrow { font-family: "JetBrains Mono", monospace; font-size: 22px; color: var(--muted); letter-spacing: 0.06em; }
.ab.sq1200 h1 { font-family: Fraunces, Georgia, serif; font-weight: 600; font-size: 96px; line-height: 1; letter-spacing: -0.02em; margin: 0px; text-wrap: balance; }
