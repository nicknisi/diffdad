<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
        <foreignObject x="0" y="0" width="1200" height="1200">
          <div xmlns="http://www.w3.org/1999/xhtml" style="width:1200px;height:1200px;">
            <style>html, body { background: transparent; }
:root { --bg: #F4EFE6; --ink: #15233F; --ink-2: #2D3A55; --on-ink: #FFF6E6; --muted: #8A8579; --line: #E1DACB; --card: #FBF7EE; --accent: #FF7A45; --accent-2: #E05E4B; --plus: #1F9D55; --minus: #D64545; }
* { box-sizing: border-box; }
html, body { margin: 0px; padding: 0px; }
body { font-family: "Space Grotesk", system-ui, sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; line-height: 1.5; background: var(--bg) !important; }
a { color: inherit; }
.wrap { max-width: 1320px; margin: 0px auto; padding: 32px; }
nav.top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
nav .brand { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; text-decoration: none; }
nav .brand .dot { color: var(--muted); font-weight: 500; }
nav .crumbs { font-family: "JetBrains Mono", monospace; font-size: 13px; color: var(--muted); }
nav .crumbs a { text-decoration: none; }
nav .crumbs a:hover { color: var(--accent); }
header.intro { max-width: 880px; margin-bottom: 36px; }
header.intro .eye { font-family: "JetBrains Mono", monospace; font-size: 13px; color: var(--muted); margin-bottom: 14px; letter-spacing: 0.04em; }
header.intro h1 { font-family: Fraunces, Georgia, serif; font-weight: 600; font-size: 56px; line-height: 1.05; letter-spacing: -0.02em; margin: 0px 0px 18px; }
header.intro h1 em { color: var(--accent); font-style: italic; }
header.intro p { font-size: 17px; color: var(--ink-2); max-width: 720px; }
header.intro p code { font-family: "JetBrains Mono", monospace; background: var(--card); border: 1px solid var(--line); padding: 2px 6px; border-radius: 4px; font-size: 14px; }
.card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 22px; margin-bottom: 28px; box-shadow: rgba(21, 35, 63, 0.1) 0px 20px 40px -20px; }
.card h2 { font-family: Fraunces, Georgia, serif; font-weight: 600; font-size: 24px; letter-spacing: -0.01em; margin: 0px 0px 4px; }
.card .meta { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--muted); margin-bottom: 18px; }
.card .meta .tag { background: var(--bg); border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px; }
.card .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
.btn { font-family: "JetBrains Mono", monospace; font-size: 12px; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--line); background: var(--bg); color: var(--ink); cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { border-color: var(--ink-2); }
.btn.primary { background: var(--accent); color: rgb(20, 32, 46); border-color: var(--accent); font-weight: 600; }
.btn.primary:hover { background: var(--accent-2); }
.stage { background: repeating-conic-gradient(rgb(237, 229, 210) 0%, rgb(237, 229, 210) 25%, rgb(244, 239, 230) 0%, rgb(244, 239, 230) 50%) 0px 0px / 24px 24px; border-radius: 12px; padding: 18px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.artboard { transform-origin: left top; box-shadow: rgba(0, 0, 0, 0.3) 0px 30px 60px -30px; flex-shrink: 0; }
.ab { position: relative; overflow: hidden; font-family: "Space Grotesk", system-ui, sans-serif; color: var(--ink); background: var(--bg); }
.ab .grain { position: absolute; inset: 0px; pointer-events: none; background-image: radial-gradient(circle at 20% 30%, rgba(255, 122, 69, 0.06), transparent 60%), radial-gradient(circle at 80% 70%, rgba(21, 35, 63, 0.04), transparent 60%); }
.ab.og1200 { width: 1200px; height: 630px; padding: 70px 80px; display: grid; grid-template-columns: 1.25fr 1fr; gap: 40px; align-items: center; }
.ab.og1200 .eyebrow { font-family: "JetBrains Mono", monospace; font-size: 18px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 22px; display: inline-flex; align-items: center; gap: 14px; }
.ab.og1200 .eyebrow .pill { background: var(--ink); color: var(--on-ink); padding: 5px 14px; border-radius: 999px; font-size: 14px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
.ab.og1200 h1 { font-family: Fraunces, Georgia, serif; font-weight: 600; font-size: 76px; line-height: 1; letter-spacing: -0.02em; margin: 0px 0px 24px; text-wrap: balance; }
.ab.og1200 h1 em { color: var(--accent); font-style: italic; }
