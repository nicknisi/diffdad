<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Diffappointment · workos/workos#1847</title>
    <link rel="icon" href="workds/workos-mark.svg" />
    <link rel="stylesheet" href="app.css?v=4" />
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" src="tweaks-panel.jsx"></script>
    <script type="text/babel" src="icons.jsx"></script>
    <script type="text/babel" src="data.jsx"></script>
    <script type="text/babel" src="narrations.jsx"></script>
    <script type="text/babel" src="md.jsx"></script>
    <script type="text/babel" src="Diff.jsx"></script>
    <script type="text/babel" src="live.jsx"></script>
    <script type="text/babel" src="Review.jsx"></script>
    <script type="text/babel">
      const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/ {
        theme: 'light',
        storyDensity: 'normal',
        codeRatio: 'balanced',
        layout: 'toc',
        density: 'comfortable',
        collapseNarration: false,
        clusterBots: true,
        liveSpeed: 1,
        storyStructure: 'chapters',
        visualStyle: 'stripe',
      }; /*EDITMODE-END*/

      function Splash({ onContinue }) {
        const Icon = window.Icons;
        return (
          <div className="splash">
            <div className="splash-card">
              <div className="splash-mark">D</div>
              <div className="splash-title">Diffappointment</div>
              <div className="splash-sub">A per-PR review tool that opens the diff as a story.</div>

              <div className="splash-cli">
                <div className="splash-cli-label">Run from your terminal</div>
                <div className="splash-cli-cmd">
                  <span className="prompt">$</span>
                  <code>
                    bunx diffappointment <span className="arg">&lt;pr-number&gt;</span>
                  </code>
                  <button
                    className="ic-btn"
                    title="Copy"
                    onClick={() => navigator.clipboard?.writeText('bunx diffappointment <pr-number>')}
                  >
                    <Icon.Files />
                  </button>
                </div>
                <div className="splash-cli-eg">
                  e.g. <code>bunx diffappointment 1847</code> opens this PR with a live webhook stream from your local
                  checkout.
                </div>
              </div>

              <div className="splash-flow">
                <div className="splash-step">
                  <span className="n">1</span> CLI subscribes to <code>workos/workos</code> webhooks
                </div>
                <div className="splash-step">
                  <span className="n">2</span> Browser opens to a per-PR review with story-laid-out diff
                </div>
                <div className="splash-step">
                  <span className="n">3</span> Comments, commits, CI all stream in live
                </div>
              </div>

              <button className="btn primary lg" onClick={onContinue}>
                Continue with demo PR <Icon.ArrowRight />
              </button>
              <div className="splash-foot">No CLI? You're seeing a static demo with synthetic webhook events.</div>
            </div>
          </div>
        );
      }

      function App() {
        const Icon = window.Icons;
        const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

        // Splash is shown once per session unless dismissed
        const [splashOpen, setSplashOpen] = React.useState(() => {
          try {
            return sessionStorage.getItem('diffapp.splashSeen') !== '1';
          } catch {
            return true;
          }
        });
        const dismissSplash = () => {
          try {
            sessionStorage.setItem('diffapp.splashSeen', '1');
          } catch {}
          setSplashOpen(false);
        };

        const [drawerOpen, setDrawerOpen] = React.useState(false);

        const live = window.useLiveStream(window.PR, { enabled: !splashOpen, speed: tweaks.liveSpeed });

        React.useEffect(() => {
          document.documentElement.classList.toggle('dark', tweaks.theme === 'dark');
        }, [tweaks.theme]);

        if (splashOpen) {
          return <Splash onContinue={dismissSplash} />;
        }

        return (
          <div className="app">
            <div className="appbar">
              <div className="brand">
                <span className="mark">D</span>
                <span className="name">Diffappointment</span>
              </div>
              <span style={{ width: 1, height: 20, background: 'var(--gray-a4)', margin: '0 4px' }} />
              <window.CliFraming pr={live.livePR} />
              <div className="right">
                <window.LivePill
                  status={live.status}
                  lastEventAt={live.lastEventAt}
                  eventCount={live.log.length}
                  onOpenLog={() => setDrawerOpen(true)}
                />
                <button
                  className="ic-btn"
                  title="Toggle theme"
                  onClick={() => setTweak('theme', tweaks.theme === 'dark' ? 'light' : 'dark')}
                >
                  {tweaks.theme === 'dark' ? <Icon.Sun /> : <Icon.Moon />}
                </button>
                <span className="avatar" style={{ background: '#6565EC' }}>
                  YN
                </span>
              </div>
            </div>

            <window.Review
              tweaks={tweaks}
              pr={live.livePR}
              clusterBots={tweaks.clusterBots}
              updatedHunks={live.updatedHunks}
            />

            <window.ActivityDrawer
              open={drawerOpen}
              onClose={() => setDrawerOpen(false)}
              log={live.log}
              status={live.status}
              replayLastN={live.replayLastN}
            />

            <window.TweaksPanel title="Tweaks">
              <window.TweakSection title="Story">
                <window.TweakRadio
                  label="Structure"
                  value={tweaks.storyStructure}
                  options={['chapters', 'linear', 'outline']}
                  onChange={(v) => setTweak('storyStructure', v)}
                />
                <window.TweakRadio
                  label="Narration density"
                  value={tweaks.storyDensity}
                  options={['terse', 'normal', 'verbose']}
                  onChange={(v) => setTweak('storyDensity', v)}
                />
                <window.TweakRadio
                  label="Code / narration ratio"
                  value={tweaks.codeRatio}
                  options={['code', 'balanced', 'prose']}
                  onChange={(v) => setTweak('codeRatio', v)}
                />
                <window.TweakToggle
                  label="Collapse narration entirely"
                  value={tweaks.collapseNarration}
                  onChange={(v) => setTweak('collapseNarration', v)}
                />
              </window.TweakSection>
              <window.TweakSection title="Layout">
                <window.TweakRadio
                  label="Visual style"
                  value={tweaks.visualStyle}
                  options={['stripe', 'linear', 'github']}
                  onChange={(v) => setTweak('visualStyle', v)}
                />
                <window.TweakRadio
                  label="Chapter layout"
                  value={tweaks.layout}
                  options={['toc', 'linear']}
                  onChange={(v) => setTweak('layout', v)}
                />
                <window.TweakRadio
                  label="Density"
                  value={tweaks.density}
                  options={['comfortable', 'compact']}
                  onChange={(v) => setTweak('density', v)}
                />
                <window.TweakRadio
                  label="Theme"
                  value={tweaks.theme}
                  options={['light', 'dark']}
                  onChange={(v) => setTweak('theme', v)}
                />
              </window.TweakSection>
              <window.TweakSection title="Live stream">
                <window.TweakToggle
                  label="Cluster bot suggestions per hunk"
                  value={tweaks.clusterBots}
                  onChange={(v) => setTweak('clusterBots', v)}
                />
                <window.TweakRadio
                  label="Replay speed"
                  value={String(tweaks.liveSpeed)}
                  options={['1', '2', '5']}
                  onChange={(v) => setTweak('liveSpeed', Number(v))}
                />
                <window.TweakButton
                  label="Show splash again"
                  onClick={() => {
                    try {
                      sessionStorage.removeItem('diffapp.splashSeen');
                    } catch {}
                    setSplashOpen(true);
                  }}
                />
              </window.TweakSection>
            </window.TweaksPanel>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
